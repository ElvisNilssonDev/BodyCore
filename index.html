<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/jpg" href="images/6f318b0e-ee4c-4add-babd-4898834bc334.png">
  <title>BodyCore</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>BodyCore</h1>
  <p class="hint">Become your best version of yourself!</p>

  <section class="controls">
    <button class="btn active" data-endpoint="liftentries">🏋🏻‍♀️ View Lifts</button>
    <button class="btn" id="goToLift">💪🏼 Configure Lifts</button>
    <button class="btn" data-endpoint="nutritionentries">🍔 View Nutrition History</button>
    <button class="btn" id="goToNutrition">🏃‍♂️ Configure Nutrition</button>
  </section>

  <div id="loading" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p>Loading data...</p>
  </div>

  <div id="error" class="error-banner" style="display: none;"></div>

  <div id="results-container"></div>

  <script src="script.js"></script>
</body>
</html>
