<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BodyCore</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>BodyCore</h1>
  <p class="hint">This is a app to log your fitness activities.</p>

  <section class="controls">
    <button class="btn active" data-endpoint="liftentries">🏋🏻‍♀️ View Lifts</button>
    <button class="btn" data-endpoint="nutritionentries">📊 View Nutrition History</button>
  </section>

  <div id="loading" class="loading" style="display: none;">
    <div class="spinner"></div>
    <p>Loading data...</p>
  </div>

  <div id="error" class="error-banner" style="display: none;"></div>

  <div id="results-container"></div>

  <script src="script.js"></script>
</body>
</html>
